apiVersion: namespaceclass.akuity.io/v1alpha1
kind: NamespaceClass
metadata:
  name: internal-network
spec:
  resources:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: internal-config
      data:
        network: internal
    # enable this to test new resource creation and deletion
    - apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: test-temp
      spec:
        podSelector: {}
        policyTypes:
          - Ingress